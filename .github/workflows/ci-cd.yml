챷ㅇname: CI/CD

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 654654563866.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: usb-dev-engame-api
  ROLE_ARN: arn:aws:iam::654654563866:role/github-actions-engame-deploy

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build jar
        run: ./mvnw -B package -DskipTests

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build docker image
        run: docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }} .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Push image to ECR
        run: docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Install yq
        run: |
          sudo curl -L https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Update gitops repo
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${GITOPS_TOKEN}@github.com/indra494/study-k8s-infra.git
          cd study-k8s-infra/gitops/overlays/dev
          yq -i '(.images[] | select(.name == "engame-api").newTag) = "${{ github.sha }}"' kustomization.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add kustomization.yaml
          git commit -m "chore: update engame-api image to ${{ github.sha }}"
          git push
